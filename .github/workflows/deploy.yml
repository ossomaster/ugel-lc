name: Deploy to La Convención cPanel

on:
  push:
    branches: ["main"]

jobs:
  Deploy:
    runs-on: ubuntu-latest
    env:
      # Opt-in oficial de GitHub para forzar node24 mientras
      # pnpm/action-setup y FTP-Deploy-Action no publiquen versiones node24
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
        env:
          NEXT_PUBLIC_BASE_PATH: webv2
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ftp.ugellaconvencion.gob.pe
          username: github@ugellaconvencion.gob.pe
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ./public_html/webv2/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/.vscode/**
            /vendor/**
            .env
            assets/files/**
